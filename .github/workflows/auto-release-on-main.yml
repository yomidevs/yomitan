name: Auto Release On Main

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read

concurrency:
  group: auto-release-on-main
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup

      - name: Compute version and tag
        id: meta
        shell: bash
        run: |
          # Keep a Chrome-compatible 4-part integer version while making the
          # last two parts fixed-width (no leading zeroes) for stable release ordering.
          # n is monotonic per workflow run + attempt.
          n=$(( ${{ github.event.workflow_run.run_number }} * 100 + ${{ github.event.workflow_run.run_attempt }} ))
          slot=50000
          version="1.0.$(( 10000 + n / slot )).$(( 10000 + n % slot ))"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Build Legal
        run: npm run license-report:html

      - name: Build release artifacts
        run: npm run-script build -- --all --version "${{ steps.meta.outputs.version }}"

      - name: Create GitHub release with extension artifacts
        id: release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # pin@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          prerelease: false
          files: builds/*

      - name: Dispatch publish-firefox-development
        uses: aurelien-baudet/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7 # pin@v2
        with:
          workflow: publish-firefox-development
          token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: false
          inputs: '{ "upload_url": "${{ steps.release.outputs.upload_url }}", "tag": "${{ steps.meta.outputs.tag }}" }'
