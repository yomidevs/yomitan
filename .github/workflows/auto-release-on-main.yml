name: Auto Release On Main

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read

concurrency:
  group: auto-release-on-main
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup

      - name: Compute version and tag
        id: meta
        shell: bash
        run: |
          # Keep Chrome-compatible 4-part integer version while staying unique per CI run attempt.
          n=$(( ${{ github.event.workflow_run.run_number }} * 100 + ${{ github.event.workflow_run.run_attempt }} ))
          version="1.0.$(( n / 65535 )).$(( n % 65535 ))"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Build Legal
        run: npm run license-report:html

      - name: Build release artifacts
        run: npm run-script build -- --all --version "${{ steps.meta.outputs.version }}"

      - name: Create GitHub release with extension artifacts
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # pin@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          prerelease: false
          files: builds/*
