name: Playwright Tests

on:
  # Browser E2E is manual-only until CI stability is improved.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-integration:
    name: Playwright Integration
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Build
        run: npm run build

      - name: Cache playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: cache-playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        if: ${{ steps.cache-playwright.outputs.cache-hit != 'true' }}
        run: npx playwright install chromium

      - name: Run integration tests
        run: npm run test:playwright:integration

  playwright-visual:
    name: Playwright Visual
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Remove all fonts
        run: rm -rf /usr/share/fonts

      - uses: actions/checkout@v6

      - name: Install CJK fonts
        uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # v1.5.3
        with:
          packages: fonts-ipafont-mincho
          execute_install_scripts: true

      - uses: ./.github/actions/setup

      - name: Build
        run: npm run build

      - name: Cache playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: cache-playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        if: ${{ steps.cache-playwright.outputs.cache-hit != 'true' }}
        run: npx playwright install chromium

      - name: Grab latest dictionaries from dictionaries branch
        uses: actions/checkout@v6
        with:
          repository: yomidevs/yomitan
          ref: dictionaries
          path: dictionaries

      - name: '[PR] Grab latest screenshots from main branch'
        uses: dawidd6/action-download-artifact@07ab29fd4a977ae4d2b275087cf67563dfdf0295 # v9
        id: baseline-screenshots
        continue-on-error: true
        if: github.event_name == 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          name: playwright-screenshots
          branch: main
          workflow: playwright.yml
          workflow_conclusion: success
          path: test/playwright/__screenshots__/

      - name: '[PR] Store baseline screenshot download outcome'
        if: github.event_name == 'pull_request'
        run: echo ${{ steps.baseline-screenshots.outcome }} > ./baseline-screenshots-outcome

      - name: '[PR] Run visual tests against main screenshots'
        if: github.event_name == 'pull_request' && steps.baseline-screenshots.outcome != 'failure'
        continue-on-error: true
        run: |
          npm run -s test:playwright:visual 2>&1 | tee ./playwright-output || true

      - name: '[Push] Refresh screenshots'
        if: github.event_name != 'pull_request'
        run: npm run -s test:playwright:visual -- -u 2>&1 | tee ./playwright-output

      - name: Ensure playwright output exists
        if: always()
        shell: bash
        run: |
          if [ ! -f playwright-output ]; then
            printf '%s\n' 'Playwright visual tests did not run.' > playwright-output
          fi

      - name: Generate HTML report
        if: ${{ !cancelled() && hashFiles('blob-report/**') != '' }}
        run: npx playwright merge-reports --reporter html ./blob-report

      - name: Generate JSON report
        if: ${{ !cancelled() && hashFiles('blob-report/**') != '' }}
        run: npx playwright merge-reports --reporter json ./blob-report > playwright-results.json

      - name: Ensure playwright results JSON exists
        if: always()
        shell: bash
        run: |
          if [ ! -f playwright-results.json ]; then
            printf '%s\n' '{"stats":{"unexpected":0,"flaky":0}}' > playwright-results.json
          fi

      - uses: actions/upload-artifact@v6
        if: github.event_name != 'pull_request'
        with:
          name: playwright-screenshots
          path: test/playwright/__screenshots__/
          retention-days: 1

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-results-json
          path: playwright-results.json
          retention-days: 7

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-output
          path: playwright-output
          retention-days: 7

      - uses: actions/upload-artifact@v6
        if: github.event_name == 'pull_request'
        with:
          name: baseline-screenshots-outcome
          path: baseline-screenshots-outcome
          retention-days: 7
