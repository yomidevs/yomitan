# For the Firefox development addon, people install it manually,
# and updates are distributed via the JSON file created in this
# action which is stored in the metadata branch of this repo.

name: publish-firefox-development
on:
  workflow_dispatch:
    inputs:
      upload_url:
        description: "The upload_url from the release created by create-prerelease-on-tag.yml"
        required: true
      tag:
        description: "Release tag containing the build artifacts"
        required: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    environment: cd
    permissions:
      contents: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # pin@v1.12
        with:
          tag: ${{ inputs.tag }}
          zipBall: true
          fileName: "*"

      - name: Check Firefox signing configuration
        id: signingConfig
        run: |
          if [[ -n "${{ secrets.FF_JWT_ISSUER }}" && -n "${{ secrets.FF_JWT_SECRET }}" && -n "${{ secrets.FF_OFFLINE_EXT_ID }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Firefox signing secrets are not configured; skipping signing and metadata update."
          fi

      - name: Sign Firefox xpi for offline distribution
        id: ffSignXpi
        if: steps.signingConfig.outputs.enabled == 'true'
        continue-on-error: true
        uses: cardinalby/webext-buildtools-firefox-sign-xpi-action@0953ef0b8a488a791f17c14fa5b800b131632d34
        with:
          approvalTimeoutMs: 1200000
          validationTimeoutMs: 3600000
          extensionId: ${{ secrets.FF_OFFLINE_EXT_ID }}
          zipFilePath: manabitan-firefox-dev.zip
          sourcesZipFilePath: manabitan-${{ inputs.tag }}.zip
          xpiFilePath: manabitan-firefox-dev.xpi
          jwtIssuer: ${{ secrets.FF_JWT_ISSUER }}
          jwtSecret: ${{ secrets.FF_JWT_SECRET }}

      - name: Abort on sign error
        if: |
          steps.signingConfig.outputs.enabled == 'true' &&
          steps.ffSignXpi.outcome == 'failure' &&
          steps.ffSignXpi.outputs.sameVersionAlreadyUploadedError != 'true'
        run: exit 1

      - name: Generate hashes
        id: hash
        if: steps.ffSignXpi.outcome == 'success'
        run: |
          echo "hashes=$(sha256sum manabitan-firefox-dev.xpi | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload offline xpi release asset
        id: uploadReleaseAsset
        if: steps.ffSignXpi.outcome == 'success'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ inputs.upload_url }}
          asset_path: manabitan-firefox-dev.xpi
          asset_name: manabitan-firefox-dev.xpi
          asset_content_type: application/x-xpinstall

      # update updates.json so that all people who have the dev version installed get the new update

      - uses: actions/checkout@v6
        id: checkoutMetadata
        if: steps.ffSignXpi.outcome == 'success'
        continue-on-error: true
        with:
          ref: metadata

      - name: Initialize metadata branch
        if: |
          steps.ffSignXpi.outcome == 'success' &&
          steps.checkoutMetadata.outcome != 'success'
        run: |
          git checkout --orphan metadata
          git rm -rf . || true

      - name: Recreate updates.json
        if: steps.ffSignXpi.outcome == 'success'
        run: |
          cat > updates.json << EOF
          {
              "addons": {
                  "{accbebce-862b-48a9-bb9a-1da9ad1f8702}": {
                      "updates": [
                          {
                              "version": "${{ inputs.tag }}",
                              "update_link": "${{ steps.uploadReleaseAsset.outputs.browser_download_url }}"
                          }
                      ]
                  }
              }
          }
          EOF

      - name: Commit files
        if: steps.ffSignXpi.outcome == 'success'
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add updates.json
          git commit -m "${{ inputs.tag }}"

      - name: Push changes
        if: steps.ffSignXpi.outcome == 'success'
        uses: ad-m/github-push-action@d91a481090679876dfc4178fef17f286781251df # pin@master
        with:
          branch: metadata

  provenance:
    needs: [build]
    if: needs.build.outputs.hashes != ''
    permissions:
      actions: read # To read the workflow path.
      id-token: write # To sign the provenance.
      contents: write # To add assets to a release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
