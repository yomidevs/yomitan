name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: JavaScript
            test: test:js
          - name: TypeScript (main)
            test: test:ts:main
          - name: TypeScript (dev)
            test: test:ts:dev
          - name: TypeScript (test)
            test: test:ts:test
          - name: TypeScript (bench)
            test: test:ts:bench
          - name: CSS
            test: test:css
          - name: HTML
            test: test:html
          - name: Markdown
            test: test:md
          - name: JSON
            test: test:json
          - name: Unit Tests
            test: test:unit
          - name: Unit Tests (options)
            test: test:unit:options

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run ${{ matrix.name }} tests
        run: npm run ${{ matrix.test }}

  test-build:
    name: Test Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Build Legal
        run: npm run license-report:html

      - name: Build
        run: npm run build

      - name: Validate manifest.json of the extension
        uses: cardinalby/schema-validator-action@2166123eb256fa40baef7e22ab1379708425efc7 # v3.1.1
        with:
          file: ext/manifest.json
          schema: ./dev/data/chrome-manifest-schema.json
          fixSchemas: true

  test-firefox-extension-e2e:
    name: Full Extension E2E (Firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Build Firefox dev package
        run: npm run build -- --target firefox-dev

      - name: Install Selenium driver dependency
        run: npm install --no-save selenium-webdriver@4.38.0

      - name: Install Firefox Developer Edition
        run: |
          curl -fsSL "https://download.mozilla.org/?product=firefox-devedition-latest-ssl&os=linux64&lang=en-US" -o /tmp/firefox-devedition.tar.bz2
          mkdir -p "$HOME/firefox-devedition"
          tar -xf /tmp/firefox-devedition.tar.bz2 -C "$HOME/firefox-devedition"
          echo "MANABITAN_FIREFOX_BINARY=$HOME/firefox-devedition/firefox/firefox" >> "$GITHUB_ENV"

      - name: Restore Firefox E2E dictionary cache
        uses: actions/cache@v4
        with:
          path: builds/e2e-dictionary-cache
          key: firefox-e2e-dictionaries-${{ runner.os }}-v1

      - name: Run Firefox extension E2E
        env:
          MANABITAN_FIREFOX_XPI: ${{ github.workspace }}/builds/manabitan-firefox-dev.zip
          MANABITAN_FIREFOX_HEADLESS: '0'
          MANABITAN_E2E_STRICT_RUNTIME: '0'
        run: xvfb-run -a npm run test:e2e:firefox-extension

      - name: Enforce Firefox extension E2E success
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'builds/firefox-e2e-import-report.json';
          if (!fs.existsSync(path)) {
            console.error('Firefox extension E2E report JSON not found.');
            process.exit(1);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const skipReason = String(report.skipReason || '');
          const isKnownUnsupportedSkip = (
            report.status === 'success-with-skips' &&
            (
              skipReason.includes('does not expose OPFS VFS') ||
              skipReason.includes('does not support MV3 background service workers')
            )
          );
          if (report.status === 'success') {
            process.exit(0);
          }
          if (isKnownUnsupportedSkip) {
            console.log(`Firefox extension E2E skipped in unsupported runtime: ${skipReason}`);
            process.exit(0);
          }
          console.error(`Firefox extension E2E status is not success: ${String(report.status)} skipReason=${skipReason}`);
          process.exit(1);
          NODE

      - name: Upload Firefox extension E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension-e2e-report
          path: |
            builds/firefox-e2e-import-report.html
            builds/firefox-e2e-import-report.json
            builds/extension-e2e-report.html
          if-no-files-found: ignore

  test-chromium-extension-e2e:
    name: Full Extension E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Build Chromium dev package
        run: npm run build -- --target chrome-dev

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore Chromium E2E dictionary cache
        uses: actions/cache@v4
        with:
          path: builds/e2e-dictionary-cache
          key: chromium-e2e-dictionaries-${{ runner.os }}-v1

      - name: Run Chromium extension E2E
        env:
          MANABITAN_CHROMIUM_HEADLESS: '1'
          MANABITAN_E2E_STRICT_RUNTIME: '1'
        run: xvfb-run -a npm run test:e2e:chromium-extension

      - name: Enforce Chromium extension E2E success
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'builds/chromium-e2e-import-report.json';
          if (!fs.existsSync(path)) {
            console.error('Chromium extension E2E report JSON not found.');
            process.exit(1);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const runtime = report.runtimeDiagnostics && typeof report.runtimeDiagnostics === 'object' ? report.runtimeDiagnostics : null;
          const opfsReady = runtime !== null && (
            runtime.hasStorageGetDirectory === true &&
            runtime.hasCreateSyncAccessHandle === true &&
            runtime.hasOpfsSahpoolVfs === true &&
            runtime.openStorageMode === 'opfs-sahpool'
          );
          if (report.status !== 'success') {
            console.error(`Chromium extension E2E status is not success: ${String(report.status)}`);
            process.exit(1);
          }
          if (report.skippedVerification === true) {
            console.error(`Chromium extension E2E skipped verification: ${String(report.skipReason || 'no reason')}`);
            process.exit(1);
          }
          if (!opfsReady) {
            console.error(`Chromium extension OPFS readiness check failed. runtimeDiagnostics=${JSON.stringify(runtime)}`);
            process.exit(1);
          }
          NODE

      - name: Summarize Chromium extension E2E
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'builds/chromium-e2e-import-report.json';
          if (!fs.existsSync(path)) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Chromium Extension E2E\nReport JSON not found.\n');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const phases = Array.isArray(report.phases) ? report.phases : [];
          const runtime = report.runtimeDiagnostics && typeof report.runtimeDiagnostics === 'object' ? report.runtimeDiagnostics : null;
          const startupDiagnostics = runtime && typeof runtime.startupDiagnosticsSnapshot === 'object' && runtime.startupDiagnosticsSnapshot !== null ?
            runtime.startupDiagnosticsSnapshot :
            null;
          const startupIncompleteCleanup = startupDiagnostics && typeof startupDiagnostics.dictionaryStartupCleanupSummary === 'object' && startupDiagnostics.dictionaryStartupCleanupSummary !== null ?
            startupDiagnostics.dictionaryStartupCleanupSummary :
            null;
          const startupIntegrityCleanup = startupDiagnostics && typeof startupDiagnostics.dictionaryTermRecordIntegritySummary === 'object' && startupDiagnostics.dictionaryTermRecordIntegritySummary !== null ?
            startupDiagnostics.dictionaryTermRecordIntegritySummary :
            null;
          const formatCleanupCounts = (summary) => {
            if (!(summary && typeof summary === 'object')) {
              return 'unknown';
            }
            const removedCount = typeof summary.removedCount === 'number' ? summary.removedCount : 'n/a';
            const failedCount = typeof summary.failedCount === 'number' ? summary.failedCount : 'n/a';
            return `removed=${String(removedCount)}, failed=${String(failedCount)}`;
          };
          const opfsReady = runtime ? (
            runtime.hasStorageGetDirectory === true &&
            runtime.hasCreateSyncAccessHandle === true &&
            runtime.hasOpfsSahpoolVfs === true &&
            runtime.openStorageMode === 'opfs-sahpool'
          ) : null;
          const top = [...phases].sort((a, b) => Number(b.durationMs || 0) - Number(a.durationMs || 0)).slice(0, 5);
          const lines = [
            '## Chromium Extension E2E',
            `- Status: \`${String(report.status || 'unknown')}\``,
            `- Skipped verification: \`${String(report.skippedVerification === true)}\``,
            `- Skip reason: ${report.skipReason ? `\`${String(report.skipReason)}\`` : 'none'}`,
            `- Launch mode: \`${String(report.launchMode || 'unknown')}\``,
            `- Failure: ${report.failureReason ? `\`${String(report.failureReason)}\`` : 'none'}`,
            `- OPFS ready: ${opfsReady === null ? 'unknown' : `\`${String(opfsReady)}\``}`,
            `- Runtime diagnostics: \`${JSON.stringify(report.runtimeDiagnostics ?? null)}\``,
            `- Startup cleanup (incomplete imports): ${formatCleanupCounts(startupIncompleteCleanup)}`,
            `- Startup cleanup (term-record integrity): ${formatCleanupCounts(startupIntegrityCleanup)}`,
            `- Phase count: ${String(phases.length)}`,
            '- Slowest phases:',
            ...top.map((phase) => `  - ${String(phase.name)} (${Number(phase.durationMs || 0).toFixed(1)} ms)`),
            '',
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE

      - name: Upload Chromium extension E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-extension-e2e-report
          path: |
            builds/chromium-e2e-import-report.html
            builds/chromium-e2e-import-report.json
            builds/extension-e2e-report.html
          if-no-files-found: ignore

  test-edge-extension-e2e:
    name: Full Extension E2E (Edge)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Build Chromium dev package
        run: npm run build -- --target chrome-dev

      - name: Install Playwright Edge
        run: npx playwright install --with-deps msedge

      - name: Restore Edge E2E dictionary cache
        uses: actions/cache@v4
        with:
          path: builds/e2e-dictionary-cache
          key: edge-e2e-dictionaries-${{ runner.os }}-v1

      - name: Run Edge extension E2E
        env:
          MANABITAN_CHROMIUM_BROWSER: edge
          MANABITAN_CHROMIUM_HEADLESS: '1'
          MANABITAN_CHROMIUM_E2E_REPORT: ./builds/edge-e2e-import-report.html
          MANABITAN_E2E_STRICT_RUNTIME: '1'
        run: xvfb-run -a npm run test:e2e:edge-extension

