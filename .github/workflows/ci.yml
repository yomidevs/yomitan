          const fs = require('node:fs');
          const path = 'builds/edge-e2e-import-report.json';
          if (!fs.existsSync(path)) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Edge Extension E2E\nReport JSON not found.\n');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const phases = Array.isArray(report.phases) ? report.phases : [];
          const runtime = report.runtimeDiagnostics && typeof report.runtimeDiagnostics === 'object' ? report.runtimeDiagnostics : null;
          const startupDiagnostics = runtime && typeof runtime.startupDiagnosticsSnapshot === 'object' && runtime.startupDiagnosticsSnapshot !== null ?
            runtime.startupDiagnosticsSnapshot :
            null;
          const startupIncompleteCleanup = startupDiagnostics && typeof startupDiagnostics.dictionaryStartupCleanupSummary === 'object' && startupDiagnostics.dictionaryStartupCleanupSummary !== null ?
            startupDiagnostics.dictionaryStartupCleanupSummary :
            null;
          const startupIntegrityCleanup = startupDiagnostics && typeof startupDiagnostics.dictionaryTermRecordIntegritySummary === 'object' && startupDiagnostics.dictionaryTermRecordIntegritySummary !== null ?
            startupDiagnostics.dictionaryTermRecordIntegritySummary :
            null;
          const formatCleanupCounts = (summary) => {
            if (!(summary && typeof summary === 'object')) {
              return 'unknown';
            }
            const removedCount = typeof summary.removedCount === 'number' ? summary.removedCount : 'n/a';
            const failedCount = typeof summary.failedCount === 'number' ? summary.failedCount : 'n/a';
            return `removed=${String(removedCount)}, failed=${String(failedCount)}`;
          };
          const opfsReady = runtime ? (
            runtime.hasStorageGetDirectory === true &&
