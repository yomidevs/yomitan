  test-firefox-android-extension-e2e:
    name: Full Extension E2E (Firefox Android)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Build Firefox Android package
        run: npm run build -- --target firefox-android

      - name: Run Firefox Android extension E2E
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MANABITAN_ANDROID_AUTO_INSTALL_FIREFOX: '1'
          MANABITAN_ANDROID_FIREFOX_PACKAGE: org.mozilla.firefox
          MANABITAN_ANDROID_WEB_EXT_TIMEOUT_MS: '45000'
          MANABITAN_E2E_STRICT_RUNTIME: '1'
        with:
          api-level: 34
          arch: x86_64
          target: default
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb devices
            npm run test:e2e:firefox-android-extension

      - name: Enforce Firefox Android extension E2E success
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'builds/firefox-android-e2e-report.json';
          if (!fs.existsSync(path)) {
            console.error('Firefox Android extension E2E report JSON not found.');
            process.exit(1);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (report.status !== 'success') {
            console.error(`Firefox Android extension E2E status is not success: ${String(report.status)} failure=${String(report.failureReason || '')}`);
            process.exit(1);
          }
          NODE

      - name: Summarize Firefox Android extension E2E
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'builds/firefox-android-e2e-report.json';
          if (!fs.existsSync(path)) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Firefox Android Extension E2E\nReport JSON not found.\n');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const phases = Array.isArray(report.phases) ? report.phases : [];
          const top = [...phases].sort((a, b) => Number(b.durationMs || 0) - Number(a.durationMs || 0)).slice(0, 5);
          const lines = [
            '## Firefox Android Extension E2E',
            `- Status: \`${String(report.status || 'unknown')}\``,
            `- Failure: ${report.failureReason ? `\`${String(report.failureReason)}\`` : 'none'}`,
            `- ADB device: \`${String(report.adbDevice || 'unknown')}\``,
            `- Firefox package: \`${String(report.firefoxPackage || 'unknown')}\``,
            `- Source dir: \`${String(report.sourceDir || 'unknown')}\``,
            `- Firefox APK URL: ${report.firefoxApkUrl ? `\`${String(report.firefoxApkUrl)}\`` : 'not-used'}`,
            `- Phase count: ${String(phases.length)}`,
            '- Slowest phases:',
            ...top.map((phase) => `  - ${String(phase.name)} (${Number(phase.durationMs || 0).toFixed(1)} ms)`),
            '',
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE

      - name: Upload Firefox Android extension E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-android-extension-e2e-report
          path: |
            builds/firefox-android-e2e-report.html
            builds/firefox-android-e2e-report.json
          if-no-files-found: ignore

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run Benchmarks
        continue-on-error: true
        uses: CodSpeedHQ/action@63ae6025a0ffee97d7736a37c9192dbd6ed4e75f # v3.2
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: npm run bench
